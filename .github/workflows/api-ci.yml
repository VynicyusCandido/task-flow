name: TaskFlow API CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'taskflow-api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'taskflow-api/**'
      - '.github/workflows/api-ci.yml'

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./taskflow-api

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build with Maven (Compile)
        run: ./mvnw test-compile

      - name: Run Unit Tests
        run: ./mvnw verify

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          check_name: "Backend Unit Tests Report"

      - name: Analyze with SonarCloud
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw sonar:sonar -Dsonar.projectKey=VynicyusCandido_taskflow-api
