name: TaskFlow App CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'taskflow-app/**'
      - '.github/workflows/app-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'taskflow-app/**'
      - '.github/workflows/app-ci.yml'

jobs:
  build-lint-test:
    name: Build, Lint & Test Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./taskflow-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './taskflow-app/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test

      - name: Build Next.js App
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright E2E Tests
        run: npm run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ./taskflow-app/playwright-report/
          retention-days: 30
