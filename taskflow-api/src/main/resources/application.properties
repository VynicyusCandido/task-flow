spring.application.name=taskflow-api

server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres}
spring.datasource.username=${DB_USERNAME:postgres.sohafadhunjlnrbypcvp}
spring.datasource.password=${DB_PASSWORD:taskflowvyni}

# HikariCP Connection Pool Settings to avoid EMAXCONNSESSION
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Configuração do Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# CORS Configuration - IMPORTANT: Set CORS_ALLOWED_ORIGINS in Render dashboard to your Vercel URL
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://taskflow-app-lovat-eta.vercel.app}